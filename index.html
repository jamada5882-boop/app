<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:BORN - 시간을 되돌리는 마법</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0f051d;
            margin: 0;
            padding: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .purple-glow {
            box-shadow: 0 0 40px -5px rgba(168, 85, 247, 0.4);
        }

        .bg-gradient-animate {
            background: linear-gradient(-45deg, #0f051d, #1a0b2e, #3b0764, #0f051d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes scan {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        .scan-line {
            animation: scan 3s linear infinite;
        }

        /* 캐릭터 스태츠 바 애니메이션 */
        .stat-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(168, 85, 247, 0.2);
            overflow: hidden;
        }

        .stat-progress {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #f0abfc);
            width: 0;
            transition: width 1.5s ease-out;
        }
    </style>
</head>

<body class="text-white overflow-x-hidden bg-gradient-animate">

    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center transition-all duration-300 glass">
        <div class="text-2xl font-bold tracking-tighter text-purple-400">RE:BORN</div>
        <button class="bg-purple-600 hover:bg-purple-500 px-5 py-2 rounded-full text-sm font-medium transition-all">앱
            다운로드</button>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-24 pb-12">
        <div data-aos="fade-up" data-aos-duration="1000">
            <h2 class="text-purple-300 text-lg md:text-xl mb-4 font-light tracking-widest uppercase">RE:BORN</h2>
            <h1 class="text-4xl md:text-7xl font-bold mb-6 leading-tight">
                어려진 당신의<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-300 to-purple-400">
                    로망을 실현하세요!
                </span>
            </h1>
            <p class="text-gray-400 max-w-md mx-auto mb-10 text-sm md:text-base leading-relaxed">
                RE:BORN 다시 태어나서<br>XX와 XX를 하세용^^
            </p>
        </div>

        <div class="relative" data-aos="zoom-in" data-aos-delay="300">
            <div
                class="w-64 h-[500px] md:w-72 md:h-[600px] bg-gray-950 rounded-[3rem] border-[8px] border-gray-800 shadow-2xl relative overflow-hidden">
                <img src="2.png" alt="Character Preview" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-purple-900/40 mix-blend-color-burn"></div>
                <div
                    class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-purple-300 to-transparent shadow-[0_0_20px_rgba(168,85,247,1)] scan-line z-10">
                </div>
            </div>
            <div
                class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-purple-600/20 blur-[120px] rounded-full">
            </div>
        </div>

        <div class="mt-12 mb-16" data-aos="fade-up" data-aos-delay="500">
            <button id="open-modal"
                class="purple-glow bg-purple-600 px-12 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition-transform active:scale-95">
                캐릭터소개
            </button>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-500 text-xs border-t border-white/5">
        <p>&copy; 2026 RE:BORN. All rights reserved.</p>
    </footer>

    <div id="modal-overlay"
        class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl hidden items-center justify-center p-4">
        <div id="modal-content"
            class="glass w-full max-w-2xl rounded-[3rem] relative scale-95 opacity-0 transition-all duration-500 overflow-hidden">

            <button id="close-modal-btn"
                class="absolute top-8 right-8 z-50 text-white/50 hover:text-white transition-colors bg-white/10 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="flex flex-col md:flex-row">
                <div class="w-full md:w-1/2 h-80 md:h-auto relative overflow-hidden">
                    <img src="1.png" alt="Character" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0f051d] via-transparent to-transparent"></div>
                </div>

                <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                    <h4 class="text-purple-400 font-bold tracking-widest text-sm mb-2">CHARACTER PROFILE</h4>
                    <h3 class="text-3xl font-bold mb-6 italic">RE:VIVE "Luna"</h3>

                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between text-xs mb-2 text-gray-400">
                                <span>어려지는 정도 (Youthfulness)</span>
                                <span>98%</span>
                            </div>
                            <div class="stat-bar">
                                <div class="stat-progress" data-width="98%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-2 text-gray-400">
                                <span>몽환적 에너지 (Mystic Vibe)</span>
                                <span>85%</span>
                            </div>
                            <div class="stat-bar">
                                <div class="stat-progress" data-width="85%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-2 text-gray-400">
                                <span>자연스러움 (Natural)</span>
                                <span>92%</span>
                            </div>
                            <div class="stat-bar">
                                <div class="stat-progress" data-width="92%"></div>
                            </div>
                        </div>
                    </div>

                    <p class="mt-8 text-sm text-gray-400 leading-relaxed">
                        루나는 시간을 되돌리는 에너지가 가장 강력한 캐릭터입니다. 당신의 고유한 분위기를 유지하면서 가장 맑았던 시절의 빛을 찾아줍니다.
                    </p>

                    <button
                        class="mt-10 w-full py-4 bg-purple-600 rounded-2xl font-bold hover:bg-purple-500 transition-all">
                        이 스타일로 적용하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        var browser = browser || chrome;
        $(document).ready(function () {
            AOS.init({ duration: 800, once: true });

            const $modalOverlay = $('#modal-overlay');
            const $modalContent = $('#modal-content');

            // 모달 열기
            $('#open-modal').on('click', function () {
                $modalOverlay.fadeIn(400).css('display', 'flex');
                setTimeout(() => {
                    $modalContent.addClass('scale-100 opacity-100').removeClass('scale-95 opacity-0');
                    // 스태츠 바 애니메이션 실행
                    $('.stat-progress').each(function () {
                        $(this).css('width', $(this).data('width'));
                    });
                }, 50);
                $('body').css('overflow', 'hidden');
            });

            // 모달 닫기 기능 (X 버튼 및 배경 클릭)
            function closeModal() {
                $modalContent.addClass('scale-95 opacity-0').removeClass('scale-100 opacity-100');
                $('.stat-progress').css('width', '0'); // 바 초기화
                setTimeout(() => {
                    $modalOverlay.fadeOut(400);
                    $('body').css('overflow', 'auto');
                }, 300);
            }

            // 수정된 부분: 정확한 ID 매칭으로 닫기 버튼 활성화
            $('#close-modal-btn').on('click', function (e) {
                e.preventDefault();
                closeModal();
            });

            $modalOverlay.on('click', function (e) {
                if (e.target === this) closeModal();
            });

            $(document).keydown(function (e) {
                if (e.keyCode === 27) closeModal();
            });
        });
    </script>
</body>

</html>
