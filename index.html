<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:BORN - 시간을 되돌리는 마법</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0f051d;
            margin: 0;
            padding: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .purple-glow {
            box-shadow: 0 0 40px -5px rgba(168, 85, 247, 0.4);
        }

        .bg-gradient-animate {
            background: linear-gradient(-45deg, #0f051d, #1a0b2e, #3b0764, #0f051d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes scan {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        .scan-line {
            animation: scan 3s linear infinite;
        }

        /* 자극적인 태그 스타일 */
        .secret-tag {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #d8b4fe;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .secret-tag:hover {
            background: rgba(244, 114, 182, 0.2);
            border-color: rgba(244, 114, 182, 0.5);
            color: #fbcfe8;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.4);
        }
    </style>
</head>

<body class="text-white overflow-x-hidden bg-gradient-animate">

    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center transition-all duration-300 glass">
        <div class="text-2xl font-bold tracking-tighter text-purple-400">RE:BORN</div>
        <a href="https://share.crack.wrtn.ai/222r7m" target="_blank" class="inline-block">
            <button class="bg-purple-600 hover:bg-purple-500 px-5 py-2 rounded-full text-sm font-medium transition-all">
                앱 다운로드
            </button>
        </a>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-24 pb-12">
        <div data-aos="fade-up" data-aos-duration="1000">
            <h2 class="text-purple-300 text-lg md:text-xl mb-4 font-light tracking-widest uppercase">RE:BORN Project
            </h2>
            <h1 class="text-4xl md:text-7xl font-bold mb-6 leading-tight">
                어려진 당신의<br>
                <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-300 to-purple-400">로망을
                    실현하세요!</span>
            </h1>
            <p class="text-gray-400 max-w-md mx-auto mb-10 text-sm md:text-base leading-relaxed italic">
                "15년 동안 나를 벌레보듯 하던 그녀가... <br>내 목소리에 얼굴을 붉히기 시작했다."
            </p>
        </div>

        <div class="relative" data-aos="zoom-in" data-aos-delay="300">
            <div
                class="w-64 h-[500px] md:w-72 md:h-[600px] bg-gray-950 rounded-[3rem] border-[8px] border-gray-800 shadow-2xl relative overflow-hidden">

                <div class="absolute inset-0 bg-purple-900/40 mix-blend-color-burn"></div>
                <div

    <div id="modal-overlay"

                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="w-full md:w-1/2 h-80 md:h-auto overflow-hidden">
                <img src="1.png" alt="한소희" class="w-full h-full object-cover">
            </div>

            <div
                class="p-8 md:p-10 w-full md:w-1/2 flex flex-col justify-center relative bg-gradient-to-br from-[#2d0b5a] via-[#0f051d] to-[#0f051d]">

                <div class="absolute top-0 right-0 w-full h-full bg-purple-600/10 mix-blend-screen pointer-events-none">
                </div>

                <div class="relative z-10">
                    <div class="flex flex-wrap gap-2 mb-4">

                    </div>

                    <h3 class="text-4xl font-bold mb-1 text-white">한소희</h3>
                    <p class="text-purple-400 font-medium text-sm mb-6 uppercase tracking-wider">24세 / 대학생 / 165cm</p>

                    <div class="relative mb-6 bg-white/5 p-4 rounded-2xl border-l-4 border-purple-500 backdrop-blur-md">
                        <p class="text-gray-300 text-xs md:text-sm leading-relaxed italic">
                            "당신이 '소년'으로 변해 무릎 위로 기어 올라간 순간, 그녀의 눈동자는 위험한 소유욕으로 번들거리기 시작합니다."
                        </p>
                    </div>

                    <div class="space-y-3 text-sm mb-8">
                        <div class="flex items-start">
                            <span class="text-purple-400 font-bold w-16 flex-shrink-0">성향</span>
                            <div class="flex flex-col text-gray-300">
                                <span>완벽주의자, 냉소적 현실주의자</span>
                                <div class="flex gap-2 mt-1 font-semibold">
                                    <span class="text-pink-400 underline decoration-pink-500/30">#쇼타콘</span>
                                    <span class="text-blue-400 underline decoration-blue-500/30">#이중인격</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <a href="https://share.crack.wrtn.ai/222r7m" class="block w-full">
                        <button
                            class="w-full py-4 bg-gradient-to-r from-purple-700 to-purple-500 rounded-xl font-bold hover:shadow-[0_0_20px_rgba(168,85,247,0.4)] transition-all active:scale-95 text-center text-white">
                            앱 다운로드

                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        var browser = browser || chrome;
        $(document).ready(function () {
            AOS.init({ duration: 800, once: true });
            const $modalOverlay = $('#modal-overlay');
            const $modalContent = $('#modal-content');

            $('#open-modal').on('click', function () {
                $modalOverlay.fadeIn(400).css('display', 'flex');
                setTimeout(() => {
                    $modalContent.addClass('scale-100 opacity-100').removeClass('scale-95 opacity-0');
                }, 50);
                $('body').css('overflow', 'hidden');
            });

            function closeModal() {
                $modalContent.addClass('scale-95 opacity-0').removeClass('scale-100 opacity-100');
                setTimeout(() => {
                    $modalOverlay.fadeOut(400);
                    $('body').css('overflow', 'auto');
                }, 300);
            }

            $('#close-modal-btn').on('click', function (e) {
                e.preventDefault();
                closeModal();
            });

            $modalOverlay.on('click', function (e) {
                if (e.target === this) closeModal();
            });

            $(document).keydown(function (e) {
                if (e.keyCode === 27) closeModal();
            });
        });
    </script>
</body>

</html>
